spring.application.name=student-management
server.port=${PORT:8080}
spring.config.import=optional:file:.env

# Database (PostgreSQL)
# Lay gia tri tu bien moi truong DATABASE_URL (tu Render), neu khong co thi fallback ve .env (LOCAL) hoac default Localhost
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:student_management}}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:postgres}}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:postgres}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
